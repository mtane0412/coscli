name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            output: cos-darwin-arm64
            smoke_test: true
          - target: bun-darwin-x64
            os: macos-latest
            output: cos-darwin-x64
            smoke_test: false
          - target: bun-linux-x64
            os: ubuntu-latest
            output: cos-linux-x64
            smoke_test: true
          - target: bun-linux-arm64
            os: ubuntu-latest
            output: cos-linux-arm64
            smoke_test: false
          - target: bun-windows-x64
            os: windows-latest
            output: cos-windows-x64.exe
            smoke_test: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 依存パッケージのインストール
        run: bun install --frozen-lockfile

      - name: バイナリのビルド
        run: bun build src/cli.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.output }} --define 'VERSION="${{ github.ref_name }}"'

      # ネイティブ実行可能ターゲット (darwin-arm64 / linux-x64 / windows-x64) のみ実行する。
      # darwin-x64 は macos-latest (ARM) で実行不可のためスキップ。linux-arm64 は ubuntu-latest (x64) で実行不可のためスキップ。
      - name: スモークテスト (--version 出力確認)
        if: matrix.smoke_test
        shell: bash
        run: |
          ./dist/${{ matrix.output }} --version

      - name: アーティファクトのアップロード
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: GitHub Release の作成
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*

  update-homebrew:
    name: Homebrew formula の更新
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: SHA256 の計算と formula の更新
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          SHA_DARWIN_ARM64=$(sha256sum dist/cos-darwin-arm64/cos-darwin-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum dist/cos-darwin-x64/cos-darwin-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum dist/cos-linux-arm64/cos-linux-arm64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum dist/cos-linux-x64/cos-linux-x64 | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mtane0412/homebrew-coscli.git
          cd homebrew-coscli

          # バージョン番号を更新 (v プレフィックスを除去)
          sed -i "s/version \"[^\"]*\"/version \"${VERSION#v}\"/" Formula/coscli.rb

          # URL パターンにマッチした次の sha256 行を書き換える関数
          update_sha() {
            local pattern="$1" sha="$2"
            awk -v p="$pattern" -v s="$sha" '
              $0 ~ p { found=1 }
              found && /sha256/ { sub(/"[^"]*"/, "\"" s "\""); found=0 }
              { print }
            ' Formula/coscli.rb > Formula/coscli.rb.tmp && mv Formula/coscli.rb.tmp Formula/coscli.rb
          }

          update_sha "cos-darwin-arm64" "$SHA_DARWIN_ARM64"
          update_sha "cos-darwin-x64"   "$SHA_DARWIN_X64"
          update_sha "cos-linux-arm64"  "$SHA_LINUX_ARM64"
          update_sha "cos-linux-x64"    "$SHA_LINUX_X64"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git diff --exit-code && echo "変更なし、スキップ" && exit 0
          git commit -am "chore: bump to ${VERSION}"
          git push
